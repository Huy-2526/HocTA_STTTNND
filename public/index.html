<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>LinguaLand - Hoc Tieng Anh Vui</title>
  <meta name="description" content="Ung dung hoc tieng Anh cho hoc sinh lop 1 voi AR, tro choi va tu vung." />
  <meta name="theme-color" content="#FF6B35" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#FF6B35',
            teal:  '#2EC4B6',
            cream: '#FFF8F0',
            bark:  '#1E1E2E',
            glass: 'rgba(255,255,255,0.15)',
          },
          fontFamily: {
            display: ['"Baloo 2"', 'cursive'],
            body:    ['Nunito', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <!-- A-Frame + AR.js -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Nunito', sans-serif; color: #1E1E2E; }
    .font-display { font-family: 'Baloo 2', cursive; }

    /* ---- AR video feed sits behind everything ---- */
    #arjs-video,
    video { position: fixed !important; top: 0; left: 0; width: 100vw !important; height: 100vh !important; object-fit: cover; z-index: -2 !important; }
    canvas.a-canvas { position: fixed !important; top: 0; left: 0; z-index: -1 !important; }

    /* ---- Glassmorphism base ---- */
    .glass {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.35);
    }
    .glass-dark {
      background: rgba(30, 30, 46, 0.5);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    /* ---- Layout shell ---- */
    #app-shell {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      pointer-events: none;
    }
    #app-shell > * { pointer-events: auto; }

    /* ---- Desktop sidebar ---- */
    #sidebar {
      display: none; flex-direction: column;
      width: 320px; height: 100vh;
      overflow-y: auto; padding: 0;
    }
    @media (min-width: 768px) {
      #app-shell { flex-direction: row; }
      #sidebar { display: flex; }
      #bottom-nav { display: none !important; }
      #main-area { flex: 1; }
    }

    /* ---- Mobile bottom nav ---- */
    #bottom-nav {
      display: flex; align-items: center; justify-content: space-around;
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    }
    @media (min-width: 768px) {
      #bottom-nav { display: none; }
    }

    /* ---- Scrollbar thin ---- */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,107,53,0.3); border-radius: 4px; }

    /* ---- Animations ---- */
    @keyframes float   { 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-8px) } }
    @keyframes pop     { 0%{ transform:scale(0) } 70%{ transform:scale(1.15) } 100%{ transform:scale(1) } }
    @keyframes fadeIn  { from{ opacity:0; transform:translateY(10px) } to{ opacity:1; transform:translateY(0) } }
    @keyframes pulse   { 0%,100%{ opacity:1 } 50%{ opacity:.5 } }
    @keyframes shake   { 0%,100%{ transform:rotate(0) } 25%{ transform:rotate(-6deg) } 75%{ transform:rotate(6deg) } }
    .anim-float  { animation: float 3s ease-in-out infinite; }
    .anim-pop    { animation: pop .4s ease-out both; }
    .anim-fadeIn { animation: fadeIn .4s ease-out both; }
    .anim-pulse  { animation: pulse 1.5s ease-in-out infinite; }
    .anim-shake  { animation: shake .4s ease-in-out; }

    /* ---- Word card in sidebar ---- */
    .word-card {
      transition: transform .15s, box-shadow .15s;
      cursor: pointer;
    }
    .word-card:hover { transform: scale(1.03); box-shadow: 0 4px 20px rgba(0,0,0,.1); }
    .word-card.active-word { border-color: #FF6B35 !important; box-shadow: 0 0 0 3px rgba(255,107,53,0.3); }

    /* ---- Bottom nav button ---- */
    .bnav-btn { transition: color .15s, transform .15s; }
    .bnav-btn.active { color: #FF6B35; transform: scale(1.1); }

    /* ---- Action buttons row ---- */
    .action-btn {
      transition: transform .15s, box-shadow .15s;
    }
    .action-btn:active { transform: scale(.92); }

    /* ---- Toast notification ---- */
    #toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      z-index: 100; transition: opacity .3s, transform .3s;
      opacity: 0; pointer-events: none;
    }
    #toast.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(-8px); }

    /* ---- Captured photo popup ---- */
    #photo-modal {
      position: fixed; inset: 0; z-index: 200;
      display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,.6); backdrop-filter: blur(6px);
    }
    #photo-modal.open { display: flex; }
  </style>
</head>

<body>

  <!-- ============================================================ -->
  <!--  A-SCENE: AR.js with embedded + transparent background       -->
  <!--  The webcam feed renders BEHIND everything (z-index: -2).    -->
  <!--  Add your own <a-marker> blocks here with local images.      -->
  <!-- ============================================================ -->
  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true; alpha: true;"
    vr-mode-ui="enabled: false"
    style="position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:-1;"
  >
    <!-- ======================================================== -->
    <!--  YOUR MARKERS GO HERE                                     -->
    <!--  Example with your Microsoft Paint images:                -->
    <!--                                                           -->
    <!--  <a-marker preset="hiro">                                 -->
    <!--    <a-image src="cat.png"                                 -->
    <!--             position="0 0.5 0"                            -->
    <!--             rotation="-90 0 0"                            -->
    <!--             scale="1 1 1">                                -->
    <!--    </a-image>                                             -->
    <!--    <a-text value="CAT"                                    -->
    <!--            position="0 0.5 0.6"                           -->
    <!--            rotation="-90 0 0"                             -->
    <!--            color="#FF6B35"                                -->
    <!--            align="center"                                 -->
    <!--            scale="1.5 1.5 1.5">                           -->
    <!--    </a-text>                                              -->
    <!--  </a-marker>                                              -->
    <!-- ======================================================== -->

    <a-marker preset="hiro">
      <a-box
        position="0 0.4 0"
        material="color: #FF6B35; opacity: 0.85;"
        scale="0.5 0.5 0.5"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear"
      ></a-box>
      <a-text
        value="APPLE"
        position="0 1 0"
        scale="1.5 1.5 1.5"
        color="#FF6B35"
        align="center"
      ></a-text>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>


  <!-- ============================================================ -->
  <!--  UI SHELL: floats on top of camera feed                      -->
  <!-- ============================================================ -->
  <div id="app-shell">

    <!-- ========== DESKTOP SIDEBAR (left) ========== -->
    <div id="sidebar" class="glass">

      <!-- Sidebar header -->
      <div class="px-5 pt-5 pb-3">
        <h1 class="font-display text-2xl font-extrabold text-brand leading-tight">LinguaLand</h1>
        <p class="text-xs font-bold text-bark/60 mt-0.5">Cung hoc tieng Anh nhe!</p>
      </div>

      <!-- Sidebar tabs -->
      <div class="flex gap-1 px-4 mb-3">
        <button onclick="switchTab('vocab')" class="tab-btn flex-1 py-1.5 rounded-lg text-xs font-bold transition" data-tab="vocab">
          <span class="block text-base">&#128218;</span> Tu vung
        </button>
        <button onclick="switchTab('game')" class="tab-btn flex-1 py-1.5 rounded-lg text-xs font-bold transition" data-tab="game">
          <span class="block text-base">&#127918;</span> Tro choi
        </button>
        <button onclick="switchTab('trophy')" class="tab-btn flex-1 py-1.5 rounded-lg text-xs font-bold transition" data-tab="trophy">
          <span class="block text-base">&#127942;</span> Thanh tich
        </button>
      </div>

      <!-- Tab content -->
      <div class="flex-1 overflow-y-auto px-4 pb-4" id="sidebar-content"></div>
    </div>

    <!-- ========== MAIN AREA (center / AR view) ========== -->
    <div id="main-area" class="flex-1 flex flex-col relative" style="pointer-events:none;">

      <!-- Top header bar (mobile + desktop) -->
      <header class="glass mx-3 mt-3 md:mx-4 md:mt-4 rounded-2xl px-4 py-3 flex items-center justify-between" style="pointer-events:auto;">
        <div class="flex items-center gap-2">
          <span class="text-2xl anim-float" style="animation-delay:.2s;">&#127775;</span>
          <div>
            <h1 class="font-display text-lg font-extrabold text-brand leading-none">LinguaLand</h1>
            <p class="text-[10px] font-bold text-bark/50">Kham pha tieng Anh bang AR</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <span id="streak-badge" class="glass-dark text-white text-xs font-bold rounded-full px-2.5 py-1">&#128293; 1</span>
          <span id="words-badge" class="glass-dark text-white text-xs font-bold rounded-full px-2.5 py-1">&#128218; 0</span>
        </div>
      </header>

      <!-- Active word display (floating center card) -->
      <div class="flex-1 flex items-center justify-center" style="pointer-events:none;">
        <div id="active-card" class="glass rounded-3xl p-6 text-center anim-fadeIn max-w-xs mx-4 hidden" style="pointer-events:auto;">
          <img id="active-img" src="" alt="" class="w-28 h-28 object-contain mx-auto mb-3 rounded-2xl bg-white/60 p-2" onerror="this.style.display='none'" />
          <h2 id="active-word" class="font-display text-4xl font-extrabold text-brand"></h2>
          <p id="active-hint" class="text-sm font-semibold text-bark/60 mt-1"></p>
          <p id="active-vn" class="text-xs font-bold text-teal mt-0.5"></p>
        </div>
      </div>

      <!-- Bottom action buttons -->
      <div class="flex items-center justify-center gap-3 px-4 pb-3 md:pb-5" style="pointer-events:auto;">
        <button onclick="speakActiveWord()" class="action-btn glass rounded-2xl px-5 py-3 flex items-center gap-2 font-bold text-sm text-bark">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072M17.95 6.05a8 8 0 010 11.9M11 5L6 9H2v6h4l5 4V5z"/></svg>
          Am thanh
        </button>
        <button onclick="takePhoto()" class="action-btn glass rounded-2xl px-5 py-3 flex items-center gap-2 font-bold text-sm text-bark">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-teal" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><circle cx="12" cy="13" r="3"/></svg>
          Chup anh
        </button>
        <button onclick="nextWord()" class="action-btn bg-brand text-white rounded-2xl px-5 py-3 flex items-center gap-2 font-bold text-sm shadow-lg shadow-brand/30">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5-5 5M6 12h12"/></svg>
          Tu tiep
        </button>
      </div>

      <!-- Mobile bottom navigation -->
      <nav id="bottom-nav" class="glass-dark rounded-t-2xl">
        <button onclick="switchTab('vocab')" class="bnav-btn active flex flex-col items-center gap-0.5 text-white" data-mob="vocab">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
          <span class="text-[10px] font-bold">Tu vung</span>
        </button>
        <button onclick="switchTab('game')" class="bnav-btn flex flex-col items-center gap-0.5 text-white/60" data-mob="game">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span class="text-[10px] font-bold">Tro choi</span>
        </button>
        <button onclick="switchTab('trophy')" class="bnav-btn flex flex-col items-center gap-0.5 text-white/60" data-mob="trophy">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
          <span class="text-[10px] font-bold">Thanh tich</span>
        </button>
      </nav>
    </div>
  </div>

  <!-- ========== TOAST ========== -->
  <div id="toast" class="glass-dark text-white text-sm font-bold rounded-full px-5 py-2.5"></div>

  <!-- ========== PHOTO MODAL ========== -->
  <div id="photo-modal">
    <div class="glass rounded-3xl p-5 mx-4 max-w-sm w-full text-center anim-pop">
      <canvas id="photo-canvas" class="w-full rounded-2xl mb-3" style="display:none;"></canvas>
      <img id="photo-preview" src="" alt="Anh da chup" class="w-full rounded-2xl mb-3" />
      <p class="font-display text-lg font-bold text-bark">Tuyet voi! &#127881;</p>
      <p class="text-bark/60 text-xs font-semibold mb-3">Ban da chup duoc khoanh khac AR</p>
      <div class="flex gap-2 justify-center">
        <a id="photo-download" download="lingualand-ar.png" class="px-4 py-2 bg-teal text-white text-sm font-bold rounded-full cursor-pointer">Tai xuong</a>
        <button onclick="closePhotoModal()" class="px-4 py-2 bg-brand text-white text-sm font-bold rounded-full cursor-pointer">Dong</button>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!--  ALL JAVASCRIPT                                              -->
  <!-- ============================================================ -->
  <script>
    /* ======================== WORD DATA ======================== */

    const WORDS = [
      { word: 'Apple',  img: 'apple.png',  hint: 'A red fruit',       vn: 'Qua tao',       category: 'Trai cay' },
      { word: 'Cat',    img: 'cat.png',     hint: 'Says meow',        vn: 'Con meo',        category: 'Dong vat' },
      { word: 'Dog',    img: 'dog.png',     hint: 'Says woof',        vn: 'Con cho',        category: 'Dong vat' },
      { word: 'Bird',   img: 'bird.png',    hint: 'Can fly',          vn: 'Con chim',       category: 'Dong vat' },
      { word: 'Fish',   img: 'fish.png',    hint: 'Lives in water',   vn: 'Con ca',         category: 'Dong vat' },
      { word: 'Banana', img: 'banana.png',  hint: 'Long and yellow',  vn: 'Qua chuoi',      category: 'Trai cay' },
      { word: 'Red',    img: 'red.png',     hint: 'Color of fire',    vn: 'Mau do',         category: 'Mau sac' },
      { word: 'Blue',   img: 'blue.png',    hint: 'Color of the sky', vn: 'Mau xanh duong', category: 'Mau sac' },
      { word: 'Green',  img: 'green.png',   hint: 'Color of grass',   vn: 'Mau xanh la',    category: 'Mau sac' },
      { word: 'Sun',    img: 'sun.png',     hint: 'Bright in the sky',vn: 'Mat troi',       category: 'Thien nhien' },
      { word: 'Moon',   img: 'moon.png',    hint: 'Shines at night',  vn: 'Mat trang',      category: 'Thien nhien' },
      { word: 'Star',   img: 'star.png',    hint: 'Twinkles at night',vn: 'Ngoi sao',       category: 'Thien nhien' },
      { word: 'Cow',    img: 'cow.png',     hint: 'Says moo',         vn: 'Con bo',         category: 'Dong vat' },
      { word: 'Hen',    img: 'hen.png',     hint: 'Lays eggs',        vn: 'Con ga mai',     category: 'Dong vat' },
      { word: 'One',    img: 'one.png',     hint: 'Number 1',         vn: 'So mot',         category: 'So dem' },
      { word: 'Two',    img: 'two.png',     hint: 'Number 2',         vn: 'So hai',         category: 'So dem' },
      { word: 'Three',  img: 'three.png',   hint: 'Number 3',         vn: 'So ba',          category: 'So dem' },
    ];

    let activeIdx = 0;
    let learnedWords = [];
    let currentTab = 'vocab';
    let streak = 1;

    /* ======================== NAVIGATION ======================== */

    function switchTab(tab) {
      currentTab = tab;
      /* Sidebar tab buttons */
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.remove('bg-brand', 'text-white');
        b.classList.add('text-bark/60');
      });
      const activeTabBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
      if (activeTabBtn) {
        activeTabBtn.classList.add('bg-brand', 'text-white');
        activeTabBtn.classList.remove('text-bark/60');
      }

      /* Mobile nav buttons */
      document.querySelectorAll('.bnav-btn').forEach(b => {
        b.classList.remove('active', 'text-white');
        b.classList.add('text-white/60');
      });
      const activeMob = document.querySelector(`.bnav-btn[data-mob="${tab}"]`);
      if (activeMob) {
        activeMob.classList.add('active', 'text-white');
        activeMob.classList.remove('text-white/60');
      }

      renderSidebar();
    }

    /* ======================== SIDEBAR RENDER ======================== */

    function renderSidebar() {
      const el = document.getElementById('sidebar-content');
      if (currentTab === 'vocab') renderVocabTab(el);
      else if (currentTab === 'game') renderGameTab(el);
      else if (currentTab === 'trophy') renderTrophyTab(el);
    }

    /* --- Vocabulary Tab --- */
    function renderVocabTab(el) {
      const categories = [...new Set(WORDS.map(w => w.category))];
      let html = `<p class="text-bark/50 text-xs font-bold mb-3">&#128161; Bam vao tu de hoc nhe!</p>`;
      categories.forEach(cat => {
        const catWords = WORDS.filter(w => w.category === cat);
        html += `<p class="font-display text-sm font-bold text-teal mt-3 mb-1.5">${cat}</p>`;
        catWords.forEach((w, i) => {
          const globalIdx = WORDS.indexOf(w);
          const isActive = globalIdx === activeIdx;
          const isLearned = learnedWords.includes(w.word);
          html += `
            <div onclick="selectWord(${globalIdx})"
                 class="word-card flex items-center gap-3 p-2.5 rounded-xl mb-1.5 transition
                        ${isActive ? 'active-word glass border-2 border-brand' : 'glass border border-white/30'}">
              <img src="${w.img}" alt="${w.word}" class="w-10 h-10 rounded-lg object-contain bg-white/50 p-1"
                   onerror="this.outerHTML='<div class=\\'w-10 h-10 rounded-lg bg-brand/10 flex items-center justify-center font-display font-bold text-brand text-lg\\'>${w.word[0]}</div>'" />
              <div class="flex-1 min-w-0">
                <p class="font-display font-bold text-sm leading-tight text-bark">${w.word}</p>
                <p class="text-[10px] text-bark/50 font-semibold">${w.vn}</p>
              </div>
              ${isLearned ? '<span class="text-teal text-sm">&#10003;</span>' : ''}
            </div>
          `;
        });
      });
      el.innerHTML = html;
    }

    /* --- Game Tab --- */
    function renderGameTab(el) {
      el.innerHTML = `
        <p class="text-bark/50 text-xs font-bold mb-3">&#127918; Chon tro choi yeu thich!</p>

        <button onclick="startMiniQuiz()" class="word-card w-full glass border border-white/30 rounded-xl p-4 mb-2 text-left">
          <span class="text-2xl">&#129513;</span>
          <p class="font-display font-bold text-sm text-bark mt-1">Do vui tu vung</p>
          <p class="text-[10px] text-bark/50 font-semibold">Chon dap an dung cho hinh anh</p>
        </button>

        <button onclick="startSpellMini()" class="word-card w-full glass border border-white/30 rounded-xl p-4 mb-2 text-left">
          <span class="text-2xl">&#9999;&#65039;</span>
          <p class="font-display font-bold text-sm text-bark mt-1">Ghep chu</p>
          <p class="text-[10px] text-bark/50 font-semibold">Sap xep cac chu cai thanh tu</p>
        </button>

        <div id="game-area" class="mt-3"></div>
      `;
    }

    /* --- Trophy Tab --- */
    function renderTrophyTab(el) {
      const total = WORDS.length;
      const learned = learnedWords.length;
      const pct = Math.round((learned / total) * 100);
      el.innerHTML = `
        <p class="text-bark/50 text-xs font-bold mb-3">&#127942; Thanh tich cua ban</p>

        <div class="glass border border-white/30 rounded-xl p-4 mb-3 text-center">
          <p class="font-display text-3xl font-extrabold text-brand">${learned}<span class="text-lg text-bark/40">/${total}</span></p>
          <p class="text-xs font-bold text-bark/50">Tu da hoc</p>
          <div class="w-full h-2.5 bg-white/40 rounded-full mt-2 overflow-hidden">
            <div class="h-full rounded-full bg-brand transition-all" style="width:${pct}%"></div>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-3">
          <div class="glass border border-white/30 rounded-xl p-3 text-center">
            <p class="text-2xl">&#128293;</p>
            <p class="font-display text-xl font-bold text-brand">${streak}</p>
            <p class="text-[10px] font-bold text-bark/50">Ngay lien tuc</p>
          </div>
          <div class="glass border border-white/30 rounded-xl p-3 text-center">
            <p class="text-2xl">&#11088;</p>
            <p class="font-display text-xl font-bold text-teal">${learned >= 5 ? '1' : '0'}</p>
            <p class="text-[10px] font-bold text-bark/50">Huy hieu</p>
          </div>
        </div>

        <p class="font-display text-sm font-bold text-teal mt-3 mb-1.5">Huy hieu</p>
        <div class="glass border border-white/30 rounded-xl p-3 flex items-center gap-3 mb-1.5 ${learned >= 3 ? '' : 'opacity-40'}">
          <span class="text-2xl">&#128218;</span>
          <div>
            <p class="font-bold text-xs text-bark">Nguoi kham pha</p>
            <p class="text-[10px] text-bark/50 font-semibold">Hoc 3 tu dau tien</p>
          </div>
          ${learned >= 3 ? '<span class="ml-auto text-teal text-xs font-bold">&#10003;</span>' : ''}
        </div>
        <div class="glass border border-white/30 rounded-xl p-3 flex items-center gap-3 mb-1.5 ${learned >= 5 ? '' : 'opacity-40'}">
          <span class="text-2xl">&#11088;</span>
          <div>
            <p class="font-bold text-xs text-bark">Hoc sinh gioi</p>
            <p class="text-[10px] text-bark/50 font-semibold">Hoc 5 tu</p>
          </div>
          ${learned >= 5 ? '<span class="ml-auto text-teal text-xs font-bold">&#10003;</span>' : ''}
        </div>
        <div class="glass border border-white/30 rounded-xl p-3 flex items-center gap-3 mb-1.5 ${learned >= 10 ? '' : 'opacity-40'}">
          <span class="text-2xl">&#127942;</span>
          <div>
            <p class="font-bold text-xs text-bark">Nha vo dich</p>
            <p class="text-[10px] text-bark/50 font-semibold">Hoc 10 tu</p>
          </div>
          ${learned >= 10 ? '<span class="ml-auto text-teal text-xs font-bold">&#10003;</span>' : ''}
        </div>

        <p class="font-display text-sm font-bold text-teal mt-3 mb-1.5">Tu da hoc</p>
        <div class="flex flex-wrap gap-1.5">
          ${learnedWords.map(w => `<span class="glass text-xs font-bold text-bark px-2.5 py-1 rounded-full border border-white/30">${w}</span>`).join('')}
          ${learnedWords.length === 0 ? '<p class="text-bark/30 text-xs font-semibold">Chua co tu nao</p>' : ''}
        </div>
      `;
    }

    /* ======================== WORD SELECTION ======================== */

    function selectWord(idx) {
      activeIdx = idx;
      const w = WORDS[idx];
      markLearned(w.word);
      showActiveCard(w);
      speak(w.word);
      renderSidebar();
      updateBadges();
    }

    function nextWord() {
      activeIdx = (activeIdx + 1) % WORDS.length;
      selectWord(activeIdx);
    }

    function showActiveCard(w) {
      const card = document.getElementById('active-card');
      card.classList.remove('hidden');
      card.classList.add('anim-pop');
      document.getElementById('active-img').src = w.img;
      document.getElementById('active-img').alt = w.word;
      document.getElementById('active-img').style.display = '';
      document.getElementById('active-word').textContent = w.word;
      document.getElementById('active-hint').textContent = w.hint;
      document.getElementById('active-vn').textContent = w.vn;
      setTimeout(() => card.classList.remove('anim-pop'), 500);
    }

    function markLearned(word) {
      if (!learnedWords.includes(word)) {
        learnedWords.push(word);
      }
    }

    function updateBadges() {
      document.getElementById('words-badge').innerHTML = `&#128218; ${learnedWords.length}`;
      document.getElementById('streak-badge').innerHTML = `&#128293; ${streak}`;
    }

    /* ======================== SPEAK ======================== */

    function speak(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        u.rate = 0.8;
        u.pitch = 1.15;
        window.speechSynthesis.speak(u);
      }
    }

    function speakActiveWord() {
      const w = WORDS[activeIdx];
      speak(w.word);
      const btn = document.querySelector('.action-btn');
      btn.classList.add('anim-shake');
      setTimeout(() => btn.classList.remove('anim-shake'), 500);
    }

    /* ======================== TAKE PHOTO ======================== */

    function takePhoto() {
      const video = document.querySelector('#arjs-video') || document.querySelector('video');
      if (!video) {
        showToast('Camera chua san sang!');
        return;
      }

      const canvas = document.getElementById('photo-canvas');
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      const ctx = canvas.getContext('2d');

      /* Draw the video frame */
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      /* Overlay: active word watermark */
      const w = WORDS[activeIdx];
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(0, canvas.height - 70, canvas.width, 70);
      ctx.font = 'bold 32px Baloo 2, Nunito, sans-serif';
      ctx.fillStyle = '#FF6B35';
      ctx.textAlign = 'center';
      ctx.fillText(w.word + '  -  ' + w.vn, canvas.width / 2, canvas.height - 28);
      ctx.font = 'bold 14px Nunito, sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.fillText('LinguaLand AR', canvas.width / 2, canvas.height - 8);

      /* Show in modal */
      const dataUrl = canvas.toDataURL('image/png');
      document.getElementById('photo-preview').src = dataUrl;
      document.getElementById('photo-download').href = dataUrl;
      document.getElementById('photo-modal').classList.add('open');

      showToast('Da chup anh! &#127881;');
    }

    function closePhotoModal() {
      document.getElementById('photo-modal').classList.remove('open');
    }

    /* ======================== TOAST ======================== */

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.innerHTML = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    /* ======================== MINI QUIZ GAME ======================== */

    function startMiniQuiz() {
      const area = document.getElementById('game-area');
      const shuffled = shuffle([...WORDS]);
      let round = 0;
      let score = 0;

      function render() {
        if (round >= 5) {
          area.innerHTML = `
            <div class="glass border border-white/30 rounded-xl p-5 text-center anim-fadeIn">
              <p class="text-3xl mb-2">${score >= 4 ? '&#127881;' : '&#128170;'}</p>
              <p class="font-display text-lg font-bold text-brand">${score}/5 dung!</p>
              <p class="text-xs text-bark/50 font-semibold mb-3">${score >= 4 ? 'Gioi qua!' : 'Co gang them nhe!'}</p>
              <button onclick="renderGameTab(document.getElementById('sidebar-content'))" class="px-4 py-1.5 bg-brand text-white text-xs font-bold rounded-full cursor-pointer">Choi lai</button>
            </div>`;
          return;
        }
        const w = shuffled[round];
        const wrongs = shuffle(WORDS.filter(x => x.word !== w.word)).slice(0, 2);
        const opts = shuffle([w, ...wrongs]);

        area.innerHTML = `
          <div class="glass border border-white/30 rounded-xl p-4 text-center anim-fadeIn">
            <p class="text-bark/40 text-[10px] font-bold mb-1">Cau ${round + 1}/5</p>
            <img src="${w.img}" alt="?" class="w-20 h-20 object-contain mx-auto rounded-xl bg-white/40 p-2 mb-2"
                 onerror="this.outerHTML='<div class=\\'font-display text-3xl font-bold text-brand mb-2\\'>${w.hint}</div>'" />
            <p class="text-xs text-bark/60 font-semibold mb-2">${w.hint}</p>
            <div class="flex flex-col gap-1.5" id="quiz-opts"></div>
          </div>`;

        const optsEl = document.getElementById('quiz-opts');
        opts.forEach(o => {
          const btn = document.createElement('button');
          btn.className = 'w-full py-2 rounded-lg glass border border-white/30 font-display font-bold text-sm text-bark cursor-pointer transition hover:border-brand';
          btn.textContent = o.word;
          btn.onclick = function () {
            optsEl.querySelectorAll('button').forEach(b => b.disabled = true);
            if (o.word === w.word) {
              score++;
              markLearned(w.word);
              btn.classList.add('bg-teal', 'text-white', 'border-teal');
              speak('Correct! ' + w.word);
            } else {
              btn.classList.add('bg-red-400', 'text-white', 'border-red-400');
              speak('The answer is ' + w.word);
            }
            updateBadges();
            setTimeout(() => { round++; render(); }, 1000);
          };
          optsEl.appendChild(btn);
        });
      }
      render();
    }

    /* ======================== MINI SPELL GAME ======================== */

    function startSpellMini() {
      const area = document.getElementById('game-area');
      const short = shuffle(WORDS.filter(w => w.word.length <= 5));
      let round = 0;
      let score = 0;

      function render() {
        if (round >= 4 || round >= short.length) {
          area.innerHTML = `
            <div class="glass border border-white/30 rounded-xl p-5 text-center anim-fadeIn">
              <p class="text-3xl mb-2">${score >= 3 ? '&#127881;' : '&#128170;'}</p>
              <p class="font-display text-lg font-bold text-brand">${score}/${Math.min(4, short.length)} dung!</p>
              <button onclick="renderGameTab(document.getElementById('sidebar-content'))" class="mt-2 px-4 py-1.5 bg-brand text-white text-xs font-bold rounded-full cursor-pointer">Choi lai</button>
            </div>`;
          return;
        }

        const w = short[round];
        const letters = shuffle(w.word.toUpperCase().split(''));
        let answer = [];

        function renderSpell() {
          area.innerHTML = `
            <div class="glass border border-white/30 rounded-xl p-4 text-center anim-fadeIn">
              <p class="text-bark/40 text-[10px] font-bold mb-1">Cau ${round + 1}/${Math.min(4, short.length)}</p>
              <img src="${w.img}" alt="?" class="w-16 h-16 object-contain mx-auto rounded-xl bg-white/40 p-2 mb-1"
                   onerror="this.outerHTML='<div class=\\'font-display text-xl font-bold text-brand mb-1\\'>${w.hint}</div>'" />
              <p class="text-xs text-bark/60 font-semibold mb-2">${w.vn}</p>
              <div class="flex justify-center gap-1.5 mb-3" id="spell-slots"></div>
              <div class="flex justify-center gap-1.5 flex-wrap" id="spell-letters"></div>
              <div id="spell-fb" class="mt-2"></div>
            </div>`;

          const slotsEl = document.getElementById('spell-slots');
          for (let i = 0; i < w.word.length; i++) {
            const d = document.createElement('div');
            d.className = `w-9 h-11 rounded-lg flex items-center justify-center font-display text-lg font-bold transition
                           ${answer[i] ? 'bg-brand text-white' : 'bg-white/40 text-bark/30 border border-white/50'}`;
            d.textContent = answer[i] || '_';
            d.onclick = () => { if (answer[i]) { answer.splice(i, 1); renderSpell(); } };
            slotsEl.appendChild(d);
          }

          const letEl = document.getElementById('spell-letters');
          const used = [...answer];
          letters.forEach(ch => {
            const ui = used.indexOf(ch);
            const isUsed = ui !== -1;
            if (isUsed) used.splice(ui, 1);
            const b = document.createElement('button');
            b.className = `w-9 h-11 rounded-lg font-display text-lg font-bold cursor-pointer transition
                           ${isUsed ? 'bg-white/20 text-bark/20 border border-dashed border-white/30' : 'bg-teal text-white shadow'}`;
            b.textContent = ch;
            b.disabled = isUsed;
            b.onclick = () => {
              if (answer.length < w.word.length) {
                answer.push(ch);
                speak(ch);
                renderSpell();
                if (answer.length === w.word.length) checkSpell();
              }
            };
            letEl.appendChild(b);
          });
        }

        function checkSpell() {
          const fb = document.getElementById('spell-fb');
          if (answer.join('') === w.word.toUpperCase()) {
            score++;
            markLearned(w.word);
            fb.innerHTML = '<p class="text-teal font-bold text-xs anim-pop">Dung roi! &#127881;</p>';
            speak('Correct! ' + w.word);
            updateBadges();
            setTimeout(() => { round++; render(); }, 1000);
          } else {
            fb.innerHTML = '<p class="text-red-400 font-bold text-xs anim-shake">Thu lai nhe!</p>';
            setTimeout(() => { answer = []; renderSpell(); }, 700);
          }
        }

        renderSpell();
      }
      render();
    }

    /* ======================== UTILS ======================== */

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    /* ======================== INIT ======================== */

    document.addEventListener('DOMContentLoaded', () => {
      switchTab('vocab');
      selectWord(0);
    });
  </script>

</body>
